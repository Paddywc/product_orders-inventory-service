server:
  port: 8086

spring:
  application:
    name: inventory-service

  kafka:
    bootstrap-servers: kafka-1:9092,kafka-2:9092,kafka-3:9092
    producer:
      transaction-id-prefix: inventory-transaction-service-${random.value}-
    consumer:
      group-id: inventory-consumer-group
      auto-offset-reset: earliest

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

kafka:
  topic:
    order-events: order.events.v1
    inventory-events: inventory.events.v1
    product-events: product.events.v1

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info